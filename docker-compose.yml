services:

  db:
    image: mysql:8.0
    restart: always
    env_file: .env
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >
      sh -c "
      sleep 10 &&
      python3 manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      "

volumes:
  mysql_data:
